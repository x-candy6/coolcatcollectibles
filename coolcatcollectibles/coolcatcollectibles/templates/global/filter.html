{% load crispy_forms_tags %}
<div class="accordion-container">
    <div class="accordion-item">
        <h2 class="accordion-header" id="headingOne">
            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                Shopping Filters
            </button>
        </h2>
        <div id="collapseOne" class="accordion-collapse collapse show" aria-labelledby="headingOne" data-bs-parent="#accordionExample">
            <div class="accordion-body">
                <div class="card">
                    <form method="post" name="filter">
                        {% csrf_token %}
                        <div class="container">
                            <div class="row">
                                {{filter_form.publisher_list.label}}
                                <div class="filter-attr">
                                    {{filter_form.publisher_list}}
                                </div>
                            </div>
                            <br>
                            <div class="row">
                                {{filter_form.year_list.label}}
                                <div class="filter-attr">
                                    {{filter_form.year_list}}
                                </div>
                            </div>
                            <br>
                            <div class="row">
                                {{filter_form.series_list.label}}
                                <div class="filter-attr">
                                    {{filter_form.series_list}}
                                </div>
                            </div>
                            <br>
                            <div class="row">
                                <div class="col-6">
                                    <button class="btn btn-primary" type="submit">Apply Filters</button>
                                </div>
                                <div class="col-6">
                                    <button class="btn btn-primary" type="submit">Clear Filters</button>
                                </div>
                            </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
