{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

	<!--<link rel="stylesheet" href=""></link>-->

	<link class="css" rel="stylesheet" href="{% static 'styles/style.css' %}">
	<link rel="stylesheet" href="{% block pagestyle %}{% endblock %}">
	</link>

	<title>{% block title %}{% endblock %}</title>

</head>

<body>
	{% include 'global/navbar.html' %}

	{% if sysMsg %}

	<div class="toast" id="myToast" data-delay="5000" role="alert" aria-live="assertive" aria-atomic="true">
		<div class="toast-header">
			<strong class="me-auto">Added to Cart</strong>
			<button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
		</div>
		<div class="toast-body">
			{{sysMsg}}
		</div>
	</div>

	{% endif %}


	<div class="page-container">
		<div class="content-wrap">
			<div class="container main-card">
				{% block body %}{% endblock %}
			</div>
		</div>
	</div>


	{% include 'global/footer.html' %}


	<script>
		// This code can go in your <script> section or in an external script file.
		document.addEventListener('DOMContentLoaded', function () {
			var myToast = new bootstrap.Toast(document.getElementById('myToast'));
			myToast.show();
		});
	</script>

	<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
</body>

</html>
